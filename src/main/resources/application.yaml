spring:
  application:
    name: nginx-gui-2
  datasource:
    url: jdbc:h2:file:./data/nginx-gui;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  sshd:
    model: ${NGINX_MODE:local}
    host: ${SSH_HOST:}
    port: ${SSH_PORT:22}
    username: ${SSH_USERNAME:}
    password: ${SSH_PASSWORD:}
